
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="universal.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v7.2.0/css/all.css">
    <script>
        const head = document.querySelector("head");
        if (!head) throw new Error("head does not exist");
        if ("%MODE%" === "development") {
            const scriptReactDevTools = document.createElement("script");
            scriptReactDevTools.src = "http://localhost:8097"
            head.appendChild(scriptReactDevTools);
        }
        const thisScript = document.currentScript;
        thisScript.remove();
    </script>
</head>
<body>
    <script type="module" src="./src/mount.tsx"></script>
</body>
</html>
