
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="universal.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v7.2.0/css/all.css">
    <title>The Web Technologies</title>
    <script>
        const isSafari = /Safari/.test(navigator.userAgent) && 
                     /Apple Computer/.test(navigator.vendor);
        if (isSafari) {
            document.documentElement.classList.add("is_safari");
        }
        const head = document.querySelector("head");
        if (!head) throw new Error("head does not exist");
        if ("%MODE%" === "development") {
            const scriptReactDevTools = document.createElement("script");
            scriptReactDevTools.src = "http://localhost:8097"
            head.appendChild(scriptReactDevTools);
        }
        const thisScript = document.currentScript;
        thisScript.remove();
    </script>
    <noscript>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap');
            * {
                font-family: 'JetBrains Mono', 'Courier New';
                color: white;
            }
            h1 {
                color: red;
            }
            body {
                justify-content: center;
                display: flex;
            }
            div {
                width: 50dvw;
                padding: 1rem;
                background-color: darkred;
            }
        </style>
    </noscript>
</head>
<body>
    <noscript>
        <div>
            <img src="https://raw.githubusercontent.com/DOGNET-SUPERB-TECHNOLOGIES/cdn/main/dognetTechnologies.png" alt="The full text version of our website logo"/>

            </p>
        </div>
    </noscript>
    <script type="module" src="./src/mount.tsx"></script>
</body>
</html>
